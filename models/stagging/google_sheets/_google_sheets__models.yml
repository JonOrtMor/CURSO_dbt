version: 2

models:
  - name: stg_google_sheets__budget
    description: "Staging model for Google Sheets budget data"
    config:
      materialized: view
    columns:
      - name: _row
        description: "Row number identifier"
        tests:
          - not_null
          - unique

      - name: product_id
        description: "Product identifier"
        tests:
          - not_null

      - name: quantity
        description: "Budgeted quantity for the product"
        tests:
          - not_null

      - name: month
        description: "Month of the budget entry"
        tests:
          - not_null

      - name: date_load
        description: "Timestamp when the record was loaded by Fivetran"
        tests:
          - not_null