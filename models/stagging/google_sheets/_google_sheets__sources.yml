version: 2

sources:
  - name: google_sheets
    schema: GOOGLE_SHEETS
    database: ALUMNO34_DEV_BRONZE_DB

    
    config:
      freshness:
        warn_after: {count: 9999, period: hour}
        error_after: {count: 99999, period: hour}

    tables:
      - name: budget
        #identifier: GOOGLE_SHEETS_BUDGET
      
        config:
          loaded_at_field: _fivetran_synced
        columns:
          - name: _row
          - name: product_id
          - name: quantity
          - name: month
          - name: _fivetran_synced

      - name: users
        columns:
          - name: Nombre
          - name: DNI
          - name: email
          - name: fecha_alta_sistema