version: 2

sources:
  - name: postgres_public
    schema: POSTGRES_PUBLIC
    database: ALUMNO34_DEV_BRONZE_DB

    quoting:
      database: false
      schema: false
      identifier: false

    freshness:
      warn_after: {count: 9999, period: day}    # cambiado de hour a day
      error_after: {count: 99999, period: day}   # cambiado de hour a day

    tables:

      - name: POSTGRES_ADDRESSES
        config:
          loaded_at_field: _fivetran_synced
        columns:
          - name: address_id
          - name: zipcode
          - name: country
          - name: address
          - name: state
          - name: _fivetran_deleted
          - name: _fivetran_synced

      - name: POSTGRES_ORDERITEMS
        config:
          loaded_at_field: _fivetran_synced
        columns:
          - name: order_id
          - name: product_id
          - name: quantity
          - name: _fivetran_deleted
          - name: _fivetran_synced

      - name: POSTGRES_ORDERS
        config:
          loaded_at_field: _fivetran_synced
        columns:
          - name: order_id
          - name: shipping_service
          - name: shipping_cost
          - name: address_id
          - name: created_at
          - name: promo_id
          - name: estimated_delivery_at
          - name: order_cost
          - name: user_id
          - name: order_total
          - name: delivered_at
          - name: tracking_id
          - name: status
          - name: _fivetran_deleted
          - name: _fivetran_synced

      - name: POSTGRES_PRODUCTS
        config:
          loaded_at_field: _fivetran_synced
        columns:
          - name: product_id
          - name: price
          - name: name
          - name: inventory
          - name: _fivetran_deleted
          - name: _fivetran_synced

      - name: POSTGRES_PROMOS
        config:
          loaded_at_field: _fivetran_synced
        columns:
          - name: promo_id
          - name: discount
          - name: status
          - name: _fivetran_deleted
          - name: _fivetran_synced

      - name: POSTGRES_USER
        config:
          loaded_at_field: _fivetran_synced
        columns:
          - name: user_id
          - name: updated_at
          - name: address_id
          - name: last_name
          - name: created_at
          - name: phone_number
          - name: total_orders
          - name: first_name
          - name: email
          - name: _fivetran_deleted
          - name: _fivetran_synced